<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pomo-tui</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap');

  :root {
    --bg: #0a0e14;
    --bg-surface: #111820;
    --bg-raised: #1a2030;
    --border: #1e2a3a;
    --text: #c8d0d8;
    --text-dim: #5c6a78;
    --text-bright: #e8eef4;
    --accent: #e8b84a;
    --green: #7ec87e;
    --red: #e06060;
    --blue: #5ca0d0;
    --bar: #2a5a3a;
    --bar-fill: #4aad6a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    line-height: 1.5;
    min-height: 100vh;
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 24px 20px;
  }

  /* Header */
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* Timer */
  .timer-section {
    text-align: right;
  }
  .timer-display {
    font-size: 32px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
  }
  .timer-display.paused { color: var(--text-dim); }
  .timer-display.idle { color: var(--text-dim); }
  .timer-display.break-mode { color: var(--green); }
  .timer-meta {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .timer-task {
    font-size: 12px;
    color: var(--text-bright);
    margin-top: 4px;
  }
  .timer-controls {
    margin-top: 8px;
    display: flex;
    gap: 6px;
    justify-content: flex-end;
  }
  .timer-controls button {
    font-family: inherit;
    font-size: 11px;
    padding: 4px 12px;
    border: 1px solid var(--border);
    background: var(--bg-raised);
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
  }
  .timer-controls button:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }
  @media (max-width: 700px) {
    .grid { grid-template-columns: 1fr; }
  }

  /* Panels */
  .panel {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    padding: 16px;
  }
  .panel-title {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-dim);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  /* Todo list */
  .todo-item {
    display: flex;
    align-items: center;
    padding: 4px 0;
    gap: 6px;
    cursor: default;
    font-size: 12px;
  }
  .todo-item:hover { background: var(--bg-raised); }
  .todo-item.done .todo-title { text-decoration: line-through; color: var(--text-dim); }
  .todo-item.active .todo-title { color: var(--accent); font-weight: 600; }
  .todo-item.priority-a .todo-title { color: var(--red); }
  .todo-item.priority-c .todo-title { color: var(--text-dim); }
  .todo-priority {
    font-size: 10px;
    font-weight: 700;
    cursor: pointer;
    user-select: none;
    padding: 0 2px;
  }
  .todo-priority.pri-a { color: var(--red); }
  .todo-priority.pri-b { color: var(--text-dim); }
  .todo-priority.pri-c { color: var(--text-dim); }
  .todo-indent { display: inline-block; }
  .todo-expand {
    width: 14px;
    text-align: center;
    color: var(--text-dim);
    cursor: pointer;
    user-select: none;
  }
  .todo-checkbox {
    cursor: pointer;
    color: var(--text-dim);
    user-select: none;
  }
  .todo-checkbox.checked { color: var(--green); }
  .todo-title { flex: 1; }
  .todo-stats {
    font-size: 10px;
    color: var(--text-dim);
    white-space: nowrap;
  }
  .todo-actions {
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .todo-item:hover .todo-actions { opacity: 1; }
  .todo-actions button {
    font-family: inherit;
    font-size: 10px;
    padding: 1px 5px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
  }
  .todo-actions button:hover { color: var(--text-bright); border-color: var(--text-dim); }
  .todo-actions button.del:hover { color: var(--red); border-color: var(--red); }

  .todo-add {
    margin-top: 8px;
    display: flex;
    gap: 4px;
  }
  .todo-add input {
    flex: 1;
    font-family: inherit;
    font-size: 11px;
    padding: 4px 8px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    outline: none;
  }
  .todo-add input:focus { border-color: var(--accent); }
  .todo-add button {
    font-family: inherit;
    font-size: 11px;
    padding: 4px 10px;
    border: 1px solid var(--border);
    background: var(--bg-raised);
    color: var(--text);
    cursor: pointer;
  }

  /* Sessions */
  .session-item {
    display: flex;
    align-items: center;
    padding: 4px 0;
    gap: 8px;
    font-size: 12px;
    border-bottom: 1px solid var(--border);
  }
  .session-item:last-child { border-bottom: none; }
  .session-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .session-dot.completed { background: var(--green); }
  .session-dot.terminated { background: var(--red); }
  .session-dot.other { background: var(--text-dim); }
  .session-duration {
    font-weight: 600;
    color: var(--text-bright);
    width: 48px;
    flex-shrink: 0;
  }
  .session-task { flex: 1; color: var(--text); }
  .session-time { font-size: 10px; color: var(--text-dim); flex-shrink: 0; }

  /* Daily chart */
  .daily-row {
    display: flex;
    align-items: center;
    padding: 3px 0;
    gap: 8px;
    font-size: 11px;
  }
  .daily-label {
    width: 36px;
    color: var(--text-dim);
    flex-shrink: 0;
  }
  .daily-bar-bg {
    flex: 1;
    height: 16px;
    background: var(--bar);
    position: relative;
  }
  .daily-bar-fill {
    height: 100%;
    background: var(--bar-fill);
    transition: width 0.3s;
  }
  .daily-value {
    width: 64px;
    text-align: right;
    color: var(--text-dim);
    flex-shrink: 0;
  }

  .empty-state {
    color: var(--text-dim);
    font-size: 11px;
    padding: 12px 0;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>pomo-tui</h1>
    <div class="timer-section">
      <div class="timer-display" id="timer-display">--:--</div>
      <div class="timer-meta" id="timer-meta"></div>
      <div class="timer-task" id="timer-task"></div>
      <div class="timer-controls">
        <button onclick="timerAction('start')">start</button>
        <button onclick="timerAction('pause')">pause</button>
        <button onclick="timerAction('reset')">reset</button>
        <button onclick="timerAction('switch')">switch</button>
      </div>
    </div>
  </header>

  <div class="grid">
    <div class="panel">
      <div class="panel-title">Todos</div>
      <div id="todo-list"></div>
      <div class="todo-add">
        <input type="text" id="todo-input" placeholder="add todo..." onkeydown="if(event.key==='Enter')addTodo()">
        <button onclick="addTodo()">+</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">Recent Sessions</div>
      <div id="session-list"></div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">This Week</div>
    <div id="daily-chart"></div>
  </div>
</div>

<script>
const API = '';

// --- Timer ---
async function fetchStatus() {
  try {
    const r = await fetch(`${API}/timer/status`);
    const data = await r.json();
    const s = data.Status || data;
    const el = document.getElementById('timer-display');
    const mins = Math.floor(s.remaining / 60);
    const secs = s.remaining % 60;
    el.textContent = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
    el.className = 'timer-display';
    if (s.is_idle) el.classList.add('idle');
    else if (s.is_paused) el.classList.add('paused');
    else if (s.mode === 'Break') el.classList.add('break-mode');

    const state = s.is_idle ? 'Idle' : s.is_paused ? 'Paused' : 'Running';
    document.getElementById('timer-meta').textContent = `${s.mode} · ${state} · ${s.preset}`;
    const prevTask = document.getElementById('timer-task').textContent;
    document.getElementById('timer-task').textContent = s.task || '';
    // Re-render todos if active task changed (e.g. from TUI side)
    if (prevTask !== (s.task || '') && todos.length > 0) renderTodos();
  } catch(e) {}
}

async function timerAction(action) {
  await fetch(`${API}/timer/${action}`, {method: 'POST'});
  fetchStatus();
}

// --- Todos ---
let todos = [];
let expandedIds = new Set();

async function fetchTodos() {
  try {
    const r = await fetch(`${API}/todos`);
    todos = await r.json();
    renderTodos();
  } catch(e) {}
}

function buildTree(items) {
  const map = {};
  const roots = [];
  items.forEach(t => { map[t.id] = {...t, children: []}; });
  items.forEach(t => {
    if (t.parent_id && map[t.parent_id]) {
      map[t.parent_id].children.push(map[t.id]);
    } else {
      roots.push(map[t.id]);
    }
  });
  return roots;
}

function renderTodos() {
  const tree = buildTree(todos);
  const container = document.getElementById('todo-list');
  container.innerHTML = '';
  if (tree.length === 0) {
    container.innerHTML = '<div class="empty-state">no todos yet</div>';
    return;
  }
  renderTree(tree, container, 0);
}

function renderTree(nodes, container, depth) {
  nodes.sort((a,b) => a.sort_order - b.sort_order);
  nodes.forEach(node => {
    const div = document.createElement('div');
    div.className = 'todo-item' + (node.done ? ' done' : '');
    if (node.priority === 'A') div.classList.add('priority-a');
    if (node.priority === 'C') div.classList.add('priority-c');
    const timerTask = document.getElementById('timer-task').textContent;
    if (node.title === timerTask && timerTask) div.classList.add('active');

    const indent = document.createElement('span');
    indent.className = 'todo-indent';
    indent.style.width = (depth * 16) + 'px';

    const expand = document.createElement('span');
    expand.className = 'todo-expand';
    if (node.children.length > 0) {
      expand.textContent = expandedIds.has(node.id) ? 'v' : '>';
      expand.onclick = () => {
        if (expandedIds.has(node.id)) expandedIds.delete(node.id);
        else expandedIds.add(node.id);
        renderTodos();
      };
    }

    const cb = document.createElement('span');
    cb.className = 'todo-checkbox' + (node.done ? ' checked' : '');
    cb.textContent = node.done ? '[x]' : '[ ]';
    cb.onclick = async () => {
      await fetch(`${API}/todos/${node.id}/toggle`, {method:'POST'});
      fetchTodos();
    };

    const pri = document.createElement('span');
    pri.className = 'todo-priority pri-' + (node.priority || 'b').toLowerCase();
    pri.textContent = node.priority !== 'B' ? `[#${node.priority}]` : '';
    pri.onclick = async (e) => {
      e.stopPropagation();
      await fetch(`${API}/todos/${node.id}/priority`, {method:'POST'});
      fetchTodos();
    };

    const title = document.createElement('span');
    title.className = 'todo-title';
    title.textContent = node.title;
    title.ondblclick = () => editTodo(node);
    title.onclick = () => selectTodo(node);

    const actions = document.createElement('span');
    actions.className = 'todo-actions';
    actions.innerHTML = `
      <button onclick="event.stopPropagation();addChildTodo('${node.id}')">+child</button>
      <button class="del" onclick="event.stopPropagation();deleteTodo('${node.id}')">del</button>
    `;

    div.append(indent, expand, cb, pri, title, actions);
    container.appendChild(div);

    if (node.children.length > 0 && expandedIds.has(node.id)) {
      renderTree(node.children, container, depth + 1);
    }
  });
}

async function addTodo() {
  const input = document.getElementById('todo-input');
  const title = input.value.trim();
  if (!title) return;
  await fetch(`${API}/todos`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({title, parent_id: null})
  });
  input.value = '';
  fetchTodos();
}

async function addChildTodo(parentId) {
  const title = prompt('Child todo:');
  if (!title) return;
  await fetch(`${API}/todos`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({title, parent_id: parentId})
  });
  expandedIds.add(parentId);
  fetchTodos();
}

async function editTodo(node) {
  const title = prompt('Edit title:', node.title);
  if (!title || title === node.title) return;
  await fetch(`${API}/todos/${node.id}`, {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({title})
  });
  fetchTodos();
}

async function deleteTodo(id) {
  if (!confirm('Delete this todo?')) return;
  await fetch(`${API}/todos/${id}`, {method: 'DELETE'});
  fetchTodos();
}

async function selectTodo(node) {
  await fetch(`${API}/timer/task`, {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({task: node.title})
  });
  await fetchStatus();
  renderTodos();
}

// --- Sessions ---
async function fetchSessions() {
  try {
    const r = await fetch(`${API}/timer/history?limit=20`);
    const sessions = await r.json();
    const container = document.getElementById('session-list');
    if (sessions.length === 0) {
      container.innerHTML = '<div class="empty-state">no sessions yet</div>';
      return;
    }
    container.innerHTML = sessions.map(s => {
      const secs = s.work_secs || 0;
      const m = Math.floor(secs / 60);
      const sec = secs % 60;
      const dur = `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
      const dotClass = s.final_event === 'Completed' ? 'completed' :
                       s.final_event === 'Terminated' ? 'terminated' : 'other';
      const time = s.started_at ? s.started_at.substring(11, 16) : '';
      return `<div class="session-item">
        <span class="session-dot ${dotClass}"></span>
        <span class="session-duration">${dur}</span>
        <span class="session-task">${s.task || ''}</span>
        <span class="session-time">${time}</span>
      </div>`;
    }).join('');
  } catch(e) {}
}

// --- Daily Stats ---
async function fetchDailyStats() {
  try {
    const r = await fetch(`${API}/stats/daily?days=7`);
    const stats = await r.json();
    const container = document.getElementById('daily-chart');
    if (stats.length === 0) {
      container.innerHTML = '<div class="empty-state">no data yet</div>';
      return;
    }

    // Fill in missing days
    const days = [];
    const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    for (let i = 6; i >= 0; i--) {
      const d = new Date();
      d.setDate(d.getDate() - i);
      const key = d.toISOString().substring(0, 10);
      const found = stats.find(s => s.date === key);
      days.push({
        label: dayNames[d.getDay()],
        secs: found ? found.total_work_secs : 0,
        sessions: found ? found.session_count : 0,
      });
    }

    const maxSecs = Math.max(...days.map(d => d.secs), 1);

    container.innerHTML = days.map(d => {
      const pct = (d.secs / maxSecs * 100).toFixed(1);
      const h = Math.floor(d.secs / 3600);
      const m = Math.floor((d.secs % 3600) / 60);
      const label = h > 0 ? `${h}h ${m}m` : `${m}m`;
      return `<div class="daily-row">
        <span class="daily-label">${d.label}</span>
        <div class="daily-bar-bg"><div class="daily-bar-fill" style="width:${pct}%"></div></div>
        <span class="daily-value">${d.secs > 0 ? label : '-'}</span>
      </div>`;
    }).join('');
  } catch(e) {}
}

// --- Init ---
fetchStatus();
fetchTodos();
fetchSessions();
fetchDailyStats();

setInterval(fetchStatus, 1000);
setInterval(() => { fetchSessions(); fetchDailyStats(); }, 30000);
</script>
</body>
</html>
